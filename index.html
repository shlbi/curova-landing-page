  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

D-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c978e722-fc2a-4ede-a32f-9daedf2b78ae\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  --bg: #FFFFFF;\n  --bg-2: #F7F8FA;\n  --bg-3: #EEF1F6;\n  --ink: #0A2540;\n  --ink-2: #1F3A5C;\n  --ink-3: #4B6584;\n  --ink-4: #8895AC;\n  --ink-5: #C6CFDE;\n  --line: #E5EAF1;\n  --line-strong: #D3DBE6;\n  --primary: #0A2540;\n  --accent: #00B4A6;\n  --accent-2: #6EE7D8;\n  --accent-soft: rgba(0, 180, 166, 0.10);\n\n  --mesh-1: #E8F4FD;\n  --mesh-2: #EBF8F7;\n  --mesh-3: #F0F4FF;\n  --mesh-4: #DFF6F3;\n\n  --font-display: \"Sora\", \"Inter\", system-ui, sans-serif;\n  --font-sans: \"Inter\", system-ui, sans-serif;\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SF Mono\", monospace;\n\n  --radius: 20px;\n  --radius-sm: 12px;\n  --radius-pill: 100px;\n\n  --shadow-sm: 0 4px 14px rgba(10, 37, 64, 0.05);\n  --shadow: 0 8px 32px rgba(10, 37, 64, 0.08);\n  --shadow-lg: 0 24px 64px rgba(10, 37, 64, 0.10);\n\n  --max: 1320px;\n  --gutter: 40px;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\nimg { max-width: 100%; display: block; }\na { color: inherit; }\n::selection { background: var(--primary); color: #fff; }\nh1, h2, h3, h4, h5, h6 { margin: 0; font-weight: 600; }\np { margin: 0; }\nbutton { font-family: inherit; }\n\n/* ---------- Layout ---------- */\n.wrap { width: 100%; max-width: var(--max); margin: 0 auto; padding: 0 var(--gutter); }\n.section { padding: 120px 0; position: relative; }\n.section.tight { padding: 80px 0; }\n.section.alt { background: var(--bg-2); }\n.section.dark { background: var(--primary); color: #fff; }\n\n/* ---------- Type ---------- */\n.display { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.025em; line-height: 1.0; }\n.mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); }\n.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 500; }\n.lede { font-family: var(--font-sans); font-size: 21px; line-height: 1.45; color: var(--ink-2); font-weight: 400; max-width: 60ch; }\n\n.section-head { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: end; margin-bottom: 72px; }\n.section-head .left { display: flex; flex-direction: column; gap: 24px; }\n.section-head h2 { font-family: var(--font-display); font-size: clamp(40px, 4.6vw, 64px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.02; color: var(--ink); max-width: 16ch; }\n.section.dark .section-head h2 { color: #fff; }\n.section.dark .lede { color: rgba(255,255,255,0.75); }\n.section.dark .mono { color: rgba(255,255,255,0.6); }\n\n/* ---------- Buttons ---------- */\n.btn { display: inline-flex; align-items: center; gap: 8px; height: 48px; padding: 0 24px; font-family: var(--font-sans); font-size: 14px; font-weight: 500; letter-spacing: -0.005em; text-decoration: none; border-radius: var(--radius-pill); cursor: pointer; transition: all 200ms cubic-bezier(.2,.7,.2,1); white-space: nowrap; border: 1px solid transparent; }\n.btn-primary { background: var(--primary); color: #fff; }\n.btn-primary:hover { background: #14365d; transform: translateY(-1px); box-shadow: var(--shadow); }\n.btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }\n.btn-ghost:hover { border-color: var(--ink); }\n.btn-teal { background: var(--accent); color: #fff; }\n.btn-teal:hover { background: #00a195; transform: translateY(-1px); }\n.section.dark .btn-ghost { color: #fff; border-color: rgba(255,255,255,0.25); }\n.section.dark .btn-ghost:hover { border-color: #fff; background: rgba(255,255,255,0.06); }\n.btn .arrow { font-size: 15px; transition: transform 200ms; }\n.btn:hover .arrow { transform: translateX(2px); }\n\n/* ---------- Chips / pills ---------- */\n.chip { display: inline-flex; align-items: center; gap: 6px; height: 26px; padding: 0 12px; font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: -0.005em; color: var(--ink-2); background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-pill); }\n.chip-accent { background: var(--accent-soft); color: #007a72; border-color: rgba(0, 180, 166, 0.3); }\n.chip-glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.6); }\n.dot { display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: var(--accent); }\n@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.85); } }\n.dot.live { animation: pulse 2s ease-in-out infinite; box-shadow: 0 0 0 4px rgba(0, 180, 166, 0.15); }\n\n/* ---------- Nav ---------- */\n.nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.72); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid var(--line); }\n.nav-inner { height: 68px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }\n.nav-links { display: flex; gap: 32px; align-items: center; }\n.nav-links a { font-size: 14px; color: var(--ink-2); text-decoration: none; font-weight: 500; letter-spacing: -0.005em; transition: color 160ms; }\n.nav-links a:hover { color: var(--primary); }\n.logo { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: -0.02em; }\n.logo svg { display: block; }\n\n/* ---------- Hero ---------- */\n.hero { position: relative; overflow: hidden; padding: 96px 0 120px; }\n.mesh { position: absolute; inset: 0; z-index: 0; pointer-events: none; }\n.mesh::before, .mesh::after, .mesh .blob {\n  content: \"\"; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.85;\n  animation: float 20s ease-in-out infinite;\n}\n.mesh::before { width: 720px; height: 720px; top: -200px; left: -120px; background: radial-gradient(circle, var(--mesh-1) 0%, transparent 70%); }\n.mesh::after { width: 640px; height: 640px; top: 60px; right: -160px; background: radial-gradient(circle, var(--mesh-2) 0%, transparent 70%); animation-delay: -7s; }\n.mesh .blob { width: 540px; height: 540px; bottom: -200px; left: 30%; background: radial-gradient(circle, var(--mesh-3) 0%, transparent 70%); animation-delay: -14s; }\n.mesh .blob.b2 { width: 460px; height: 460px; bottom: -120px; right: 20%; background: radial-gradient(circle, var(--mesh-4) 0%, transparent 70%); animation-delay: -3s; }\n@keyframes float {\n  0%, 100% { transform: translate(0, 0) scale(1); }\n  33% { transform: translate(40px, -30px) scale(1.05); }\n  66% { transform: translate(-30px, 40px) scale(0.95); }\n}\n.hero .wrap { position: relative; z-index: 1; }\n.hero-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: 80px; align-items: center; }\n.hero-eyebrow-pill { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px 8px 10px; background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow-sm); border-radius: var(--radius-pill); font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--ink-2); margin-bottom: 32px; }\n.hero h1 { font-family: var(--font-display); font-size: clamp(52px, 6.8vw, 96px); font-weight: 600; letter-spacing: -0.035em; line-height: 0.96; color: var(--ink); margin-bottom: 28px; }\n.hero h1 .grad { background: linear-gradient(120deg, var(--accent) 0%, var(--primary) 60%); -webkit-background-clip: text; background-clip: text; color: transparent; }\n.hero .sub { font-family: var(--font-display); font-size: clamp(22px, 2.2vw, 30px); font-weight: 400; color: var(--ink-3); letter-spacing: -0.015em; margin-bottom: 28px; }\n.hero .body { font-size: 18px; line-height: 1.55; color: var(--ink-3); max-width: 52ch; margin-bottom: 36px; }\n.hero .body strong { color: var(--ink); font-weight: 600; }\n.hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }\n\n/* Glass card */\n.glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%); border: 1px solid rgba(255,255,255,0.5); box-shadow: var(--shadow); border-radius: var(--radius); }\n\n.event-stream { padding: 28px; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.85; }\n.event-stream .es-head { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }\n.event-stream .es-title { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }\n.event-stream .es-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 6px; }\n.event-stream .line { display: grid; grid-template-columns: 64px 64px 1fr auto; gap: 16px; padding: 5px 0; align-items: center; }\n.event-stream .line:hover { background: rgba(0, 180, 166, 0.04); }\n.event-stream .t { color: var(--ink-4); font-size: 11px; }\n.event-stream .mod { color: var(--accent); font-weight: 500; }\n.event-stream .ev { color: var(--ink-2); }\n.event-stream .ok { color: var(--accent); font-size: 11px; }\n\n/* Stats */\n.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; padding: 56px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-top: 80px; }\n.stat { padding: 0 24px; border-right: 1px solid var(--line); }\n.stat:last-child { border-right: none; }\n.stat .num { font-family: var(--font-display); font-size: clamp(40px, 4vw, 56px); font-weight: 600; letter-spacing: -0.03em; color: var(--ink); line-height: 1; }\n.stat .num .accent { color: var(--accent); }\n.stat .label { font-size: 13px; color: var(--ink-3); margin-top: 14px; line-height: 1.45; max-width: 24ch; }\n\n/* ---------- Generic grids ---------- */\n.cols { display: grid; gap: 24px; }\n.cols-2 { grid-template-columns: 1fr 1fr; }\n.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.cols-4 { grid-template-columns: repeat(4, 1fr); }\n\n/* ---------- Problem ---------- */\n.problem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n.problem-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 36px; transition: all 240ms cubic-bezier(.2,.7,.2,1); position: relative; overflow: hidden; }\n.problem-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-strong); }\n.problem-card .pn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; font-weight: 500; }\n.problem-card h3 { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 16px; color: var(--ink); max-width: 18ch; }\n.problem-card p { color: var(--ink-3); font-size: 14.5px; line-height: 1.55; }\n\n/* ---------- Platform stack ---------- */\n.stack { display: grid; gap: 12px; }\n.stack-layer { padding: 28px 32px; borde r(--ink); box-shadow: var(--shadow-sm); }\n.tweaks-panel select { width: 100%; padding: 9px 12px; border: 1px solid var(--line-strong); background: #fff; border-radius: 8px; font-family: var(--font-sans); font-size: 13px; color: var(--ink); cursor: pointer; }\n\n/* ---------- Responsive ---------- */\n@media (max-width: 1024px) {\n  .section-head { grid-template-columns: 1fr; gap: 16px; align-items: start; }\n  .hero-grid { grid-template-columns: 1fr; gap: 48px; }\n  .stats { grid-template-columns: 1fr 1fr; }\n  .stat:nth-child(2) { border-right: none; }\n  .problem-grid, .modules-grid, .pillars, .trust-grid, .trust-posture { grid-template-columns: 1fr 1fr; }\n  .seven-grid, .national-rails { grid-template-columns: 1fr 1fr; }\n  .stack-layer { grid-template-columns: 1fr; gap: 12px; }\n  .dtg-flow { grid-template-columns: 1fr 1fr; }\n  .dtg-meta { grid-template-columns: 1fr 1fr; }\n  .roadmap-row { grid-template-columns: 1fr; gap: 8px; }\n  .footer-grid { grid-template-columns: 1fr 1fr; }\n  .nav-links { display: none; }\n}\n@media (max-width: 640px) {\n  :root { --gutter: 20px; }\n  .section { padding: 80px 0; }\n  .stats { grid-template-columns: 1fr; gap: 32px; padding: 32px 0; }\n  .stat { border-right: none; padding: 0; }\n  .problem-grid, .modules-grid, .pillars, .trust-grid, .trust-posture { grid-template-columns: 1fr; }\n  .seven-grid, .national-rails { grid-template-columns: 1fr; }\n  .dtg-flow, .dtg-meta { grid-template-columns: 1fr; }\n  .footer-grid { grid-template-columns: 1fr; }\n  .dtg-card { padding: 32px; }\n  .tweaks-panel { right: 12px; left: 12px; width: auto; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ---------- NAV ---------- -->\n<nav class=\"nav\">\n  <div class=\"wrap nav-inner\">\n    <a class=\"logo\" href=\"#\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\">\n        <circle cx=\"11\" cy=\"11\" r=\"10\" stroke=\"#0A2540\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"11\" cy=\"11\" r=\"4\" fill=\"#00B4A6\"><\u002Fcircle>\n      <\u002Fsvg>\n      <span>Curova<\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#platform\">Platform<\u002Fa>\n      <a href=\"#intelligence\">Intelligence<\u002Fa>\n      <a href=\"#trust\">Trust<\u002Fa>\n      <a href=\"#india\">India<\u002Fa>\n      <a href=\"#about\">About<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:10px;\">\n      <a class=\"btn btn-ghost\" href=\"#cta\">Talk to us<\u002Fa>\n      <a class=\"btn btn-primary\" href=\"#platform\">Explore platform <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ---------- HERO ---------- -->\n<section class=\"hero\">\n  <div class=\"mesh\">\n    <div class=\"blob\"><\u002Fdiv>\n    <div class=\"blob b2\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-grid\">\n      <div class=\"fade-up\">\n        <span class=\"hero-eyebrow-pill\">\n          <span class=\"dot live\"><\u002Fspan>\n          <span>v1 substrate · India first · built for the world<\u002Fspan>\n        <\u002Fspan>\n        <h1>From symptom to recovery, <span class=\"grad\">and beyond.<\u002Fspan><\u002Fh1>\n        <p class=\"sub\">From the infinitesimal to the infinite.<\u002Fp>\n        <p class=\"body\"><strong>Curova is the rail layer for healthcare.<\u002Fstrong> One care record across clinicians, diagnostics, pharmacies, and payers — built in India, built for the world.<\u002Fp>\n        <div class=\"hero-cta\">\n          <a class=\"btn btn-primary\" href=\"#platform\">Explore the platform <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n          <a class=\"btn btn-ghost\" href=\"#architecture\">View the architecture<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\">\n        <div class=\"event-stream\">\n          <div class=\"es-head\">\n            <div class=\"es-title\">governed.event.stream<\u002Fdiv>\n            <div class=\"es-status\"><span class=\"dot live\"><\u002Fspan> live · FHIR R4<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+0.00s<\u002Fspan><span class=\"mod\">Node<\u002Fspan><span class=\"ev\">triage.intent (voice · hi)<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+0.42s<\u002Fspan><span class=\"mod\">Node<\u002Fspan><span class=\"ev\">consent.scope (treatment)<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+0.55s<\u002Fspan><span class=\"mod\">OS<\u002Fspan><span class=\"ev\">consent.receipt.issued<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+1.10s<\u002Fspan><span class=\"mod\">Axis<\u002Fspan><span class=\"ev\">encounter.create<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+1.34s<\u002Fspan><span class=\"mod\">IQ<\u002Fspan><span class=\"ev\">summary.draft<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+1.40s<\u002Fspan><span class=\"mod\">Axis<\u002Fspan><span class=\"ev\">signoff.attached (Dr. M.)<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+1.85s<\u002Fspan><span class=\"mod\">Detect<\u002Fspan><span class=\"ev\">order.routed (lab:#A12)<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+2.10s<\u002Fspan><span class=\"mod\">Detect<\u002Fspan><span class=\"ev\">result.fhir.observation<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+2.40s<\u002Fspan><span class=\"mod\">Dose<\u002Fspan><span class=\"ev\">rx.validated<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+2.78s<\u002Fspan><span class=\"mod\">Pay<\u002Fspan><span class=\"ev\">receipt.issued<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n          <div class=\"line\"><span class=\"t\">T+3.05s<\u002Fspan><span class=\"mod\">Insure<\u002Fspan><span class=\"ev\">claim.attested<\u002Fspan><span class=\"ok\">✓<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stats fade-up\">\n      <div class=\"stat\">\n        <div class=\"num\">$1T<span class=\"accent\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"label\">Annual emerging-market health spend<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"num\">12<\u002Fdiv>\n        <div class=\"label\">Modules on one governed substrate<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"num\">22<span class=\"accent\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"label\">Languages, voice-first by necessity<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"num\">2032<\u002Fdiv>\n        <div class=\"label\">One continuous record, birth to death<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- PROBLEM ---------- -->\n<section class=\"section alt\" id=\"problem\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">01 · The problem<\u002Fspan>\n        <h2>Healthcare digitized into a thousand systems. It never built rails.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">The internet got TCP/IP. Finance got SWIFT and UPI. Healthcare got systems — EMRs, HIS, LIS, claim portals — each solving its operator's problem, none solving continuity.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"problem-grid\">\n      <div class=\"problem-card fade-up\">\n        <div class=\"pn\">01 — Rails, not systems<\u002Fdiv>\n        <h3>A thousand systems do not make a network.<\u002Fh3>\n        <p>Coordination requires a rail layer. Healthcare does not have one. Every actor solves its local problem; the global property of continuity belongs to no one.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"problem-card fade-up\">\n        <div class=\"pn\">02 — Incentives<\u002Fdiv>\n        <h3>No actor in healthcare gets paid to coordinate care.<\u002Fh3>\n        <p>Clinicians are paid per visit. Labs per panel. Pharmacies per fill. Insurers per claim. Continuity — the patient's arc from symptom to recovery — is a system-level property no business model owns.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"problem-card fade-up\">\n        <div class=\"pn\">03 — Curova<\u002Fdiv>\n        <h3>We build both — the rails, and the business model that pays for continuity.<\u002Fh3>\n        <p>When rails exist and incentives align, coordination becomes the default — not an act of heroism. From symptom to wellness, as a single governed event stream.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- PLATFORM STACK ---------- -->\n<section class=\"section\" id=\"platform\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">02 · Platform<\u002Fspan>\n        <h2>One stack. Twelve modules. A single intelligence substrate.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">Each module is independently useful. Together, they compose the operating system for emerging-market healthcare — one data model, one event bus, one governed intelligence.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"stack\">\n      <div class=\"stack-layer fade-up\">\n        <div>\n          <div class=\"ll-id\">L4 — Experience<\u002Fdiv>\n          <div class=\"ll-name\">Surfaces<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ll-modules\">\n          <span class=\"chip\">Node · Patients<\u002Fspan>\n          <span class=\"chip\">Axis · Clinicians<\u002Fspan>\n          <span class=\"chip\">Detect · Diagnostics<\u002Fspan>\n          <span class=\"chip\">Dose · Pharmacy<\u002Fspan>\n          <span class=\"chip\">Nexus · Networks<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-layer fade-up\">\n        <div>\n          <div class=\"ll-id\">L3 — Value rails<\u002Fdiv>\n          <div class=\"ll-name\">Money &amp; cover<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ll-modules\">\n          <span class=\"chip\">Pay · Payments<\u002Fspan>\n          <span class=\"chip\">Insure · Claims<\u002Fspan>\n          <span class=\"chip\">Wellness · Prevention<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-layer iq fade-up\">\n        <div>\n          <div class=\"ll-id\">L2 — Intelligence<\u002Fdiv>\n          <div class=\"ll-name\">IQ Engine<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ll-modules\">\n          <span class=\"chip chip-accent\">Decision Trail Graph<\u002Fspan>\n          <span class=\"chip chip-accent\">Governed Care Ledger<\u002Fspan>\n          <span class=\"chip\">HITL primitives<\u002Fspan>\n          <span class=\"chip\">Eval &amp; red-team<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-layer fade-up\">\n        <div>\n          <div class=\"ll-id\">L1 — Substrate<\u002Fdiv>\n          <div class=\"ll-name\">Curova OS<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ll-modules\">\n          <span class=\"chip\">FHIR R4<\u002Fspan>\n          <span class=\"chip\">ABHA<\u002Fspan>\n          <span class=\"chip\">Consent receipts<\u002Fspan>\n          <span class=\"chip\">Audit stream<\u002Fspan>\n          <span class=\"chip\">Policy engine<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stack-layer fade-up\">\n        <div>\n          <div class=\"ll-id\">L0 — Foundations<\u002Fdiv>\n          <div class=\"ll-name\">Public rails<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ll-modules\">\n          <span class=\"chip\">Identity<\u002Fspan>\n          <span class=\"chip\">Interop<\u002Fspan>\n          <span class=\"chip\">Multilingual<\u002Fspan>\n          <span class=\"chip\">Logistics<\u002Fspan>\n          <span class=\"chip\">Payments rails<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- MODULES ---------- -->\n<section class=\"section alt\" id=\"modules\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">03 · Modules<\u002Fspan>\n        <h2>Independently useful. Composable by design.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">Each module is a rail in a different part of the care arc. Every Curova module deploys on its own value, integrates with existing infrastructure, and contributes structured events back to the intelligence layer.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"modules-grid\" id=\"modules-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- INTELLIGENCE ---------- -->\n<section class=\"section\" id=\"intelligence\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">04 · Intelligence<\u002Fspan>\n        <h2>The durable advantage isn't the interface. It's the decision trail.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">Curova IQ is the governed intelligence layer that learns from consented, structured, longitudinal events. We do not optimize for autonomy. We optimize for safety, explainability, and human leverage.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"dtg-card fade-up\">\n      <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;\">\n        <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.6); font-weight: 500;\">Decision Trail Graph — single encounter<\u002Fdiv>\n        <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-2); display: flex; align-items: center; gap: 8px;\"><span class=\"dot live\"><\u002Fspan> attestable · replayable<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dtg-flow\">\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 01<\u002Fdiv><div class=\"name\">Symptom<\u002Fdiv><div class=\"src\">patient · voice<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 02<\u002Fdiv><div class=\"name\">Triage<\u002Fdiv><div class=\"src\">Node · AI-guided<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 03<\u002Fdiv><div class=\"name\">Consult<\u002Fdiv><div class=\"src\">Axis · clinician<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 04<\u002Fdiv><div class=\"name\">Diagnostic<\u002Fdiv><div class=\"src\">Detect · FHIR<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 05<\u002Fdiv><div class=\"name\">Medication<\u002Fdiv><div class=\"src\">Dose · validated<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 06<\u002Fdiv><div class=\"name\">Claim<\u002Fdiv><div class=\"src\">Insure · attested<\u002Fdiv><\u002Fdiv>\n        <div class=\"dtg-node\"><div class=\"stage\">Stage 07<\u002Fdiv><div class=\"name\">Outcome<\u002Fdiv><div class=\"src\">longitudinal<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dtg-meta\">\n        <div><div class=\"k\">Consent<\u002Fdiv><div class=\"v\">Purpose-bound at the call site.<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Provenance<\u002Fdiv><div class=\"v\">FHIR lineage end to end.<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Sign-off<\u002Fdiv><div class=\"v\">Named clinician, first-class object.<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"k\">Audit<\u002Fdiv><div class=\"v\">Append-only, cryptographically chained.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pillars\" id=\"pillars\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- TRUST ---------- -->\n<section class=\"section alt\" id=\"trust\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">05 · Trust<\u002Fspan>\n        <h2>Trust is a primitive, not a feature.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">Consent, purpose, audit, sign-off, and explainability are wired into the substrate — not bolted on. Every event in Curova carries the metadata needed for clinicians to verify it, regulators to inspect it, and patients to revoke it.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"trust-posture\">\n      <div class=\"tp fade-up\">\n        <div class=\"word\">Assistive<span class=\"dot-accent\">.<\u002Fspan><\u002Fdiv>\n        <p>Curova is health intelligence infrastructure. Clinical decisions are made by licensed clinicians.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tp fade-up\">\n        <div class=\"word\">Governed<span class=\"dot-accent\">.<\u002Fspan><\u002Fdiv>\n        <p>Consent, purpose, and policy are checked at every read and write — not bolted on after the fact.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tp fade-up\">\n        <div class=\"word\">Human-supervised<span class=\"dot-accent\">.<\u002Fspan><\u002Fdiv>\n        <p>No clinical recommendation reaches a patient without a named clinician's sign-off.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"trust-grid\" id=\"trust-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- INDIA ---------- -->\n<section class=\"section\" id=\"india\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">06 · India<\u002Fspan>\n        <h2>Built where national rails land first.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">India is where Curova starts — not because the opportunity stops at the border. ABDM is the first national rail experiment in healthcare anywhere in the world: identity, consent, records, and exchange as public infrastructure.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"seven-grid\" id=\"seven-grid\"><\u002Fdiv>\n\n    <div class=\"national-rails\">\n      <div class=\"nr fade-up\">\n        <div class=\"nr-tag\">ABHA<\u002Fdiv>\n        <div class=\"nr-name\">Health accounts<\u002Fdiv>\n        <div class=\"nr-d\">Patient-controlled health IDs that link records across networks.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"nr fade-up\">\n        <div class=\"nr-tag\">ABDM<\u002Fdiv>\n        <div class=\"nr-name\">Consent manager<\u002Fdiv>\n        <div class=\"nr-d\">Compliant artefacts: purpose, scope, duration. Revocable and portable.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"nr fade-up\">\n        <div class=\"nr-tag\">HCX<\u002Fdiv>\n        <div class=\"nr-name\">Health Claims Exchange<\u002Fdiv>\n        <div class=\"nr-d\">Insure speaks HCX-shaped envelopes so claims travel cleanly between providers and payers.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"nr fade-up\">\n        <div class=\"nr-tag\">UHI<\u002Fdiv>\n        <div class=\"nr-name\">Unified Health Interface<\u002Fdiv>\n        <div class=\"nr-d\">Open discovery and booking primitives lower the barrier to the right provider on day one.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- ROADMAP ---------- -->\n<section class=\"section alt\" id=\"roadmap\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div class=\"left fade-up\">\n        <span class=\"eyebrow\">07 · Roadmap<\u002Fspan>\n        <h2>Phased rollout. Real value at every step.<\u002Fh2>\n      <\u002Fdiv>\n      <p class=\"lede fade-up\">North star — by 2032, every patient in our markets has one continuous record from birth to death, owned by them, accessible to their care team, settled cleanly with their payer.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"roadmap\" id=\"roadmap-list\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- CTA ---------- -->\n<section class=\"section dark cta\" id=\"cta\">\n  <div class=\"wrap\">\n    <span class=\"eyebrow fade-up\" style=\"color: var(--accent-2);\">08 · Partner with us<\u002Fspan>\n    <h2 class=\"fade-up\" style=\"margin-top: 16px;\">Build the rail layer healthcare <span class=\"grad\">never had.<\u002Fspan><\u002Fh2>\n    <p class=\"sub fade-up\">We work with founders, clinicians, lab and pharmacy networks, payers, and capital partners who want to compound real care infrastructure — not another app.<\u002Fp>\n    <div class=\"cta-buttons fade-up\">\n      <a class=\"btn btn-teal\" href=\"#\">Pilot with us <span class=\"arrow\">→<\u002Fspan><\u002Fa>\n      <a class=\"btn btn-ghost\" href=\"#\">Partner with Curova<\u002Fa>\n      <a class=\"btn btn-ghost\" href=\"#\">Request investor brief<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ---------- FOOTER ---------- -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"footer-grid\">\n      <div class=\"footer-col\">\n        <a class=\"logo\" href=\"#\" style=\"margin-bottom: 20px;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\">\n            <circle cx=\"11\" cy=\"11\" r=\"10\" stroke=\"#fff\" stroke-width=\"1.5\"><\u002Fcircle>\n            <circle cx=\"11\" cy=\"11\" r=\"4\" fill=\"#00B4A6\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span>Curova<\u002Fspan>\n        <\u002Fa>\n        <p style=\"max-width:40ch; line-height:1.55; margin-top: 16px;\">Health intelligence infrastructure for emerging markets. From symptom to recovery and beyond.<\u002Fp>\n        <div style=\"display:flex; gap:8px; margin-top: 20px; flex-wrap: wrap;\">\n          <a href=\"mailto:hello@curova.com\" class=\"chip\" style=\"background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.15); color:rgba(255,255,255,0.85); text-decoration:none;\">hello@curova.com<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Platform<\u002Fh5>\n        <ul>\n          <li><a href=\"#platform\">Architecture<\u002Fa><\u002Fli>\n          <li><a href=\"#intelligence\">Intelligence<\u002Fa><\u002Fli>\n          <li><a href=\"#trust\">Trust<\u002Fa><\u002Fli>\n          <li><a href=\"#modules\">Modules<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Modules<\u002Fh5>\n        <ul>\n          <li><a href=\"#modules\">Node · Patients<\u002Fa><\u002Fli>\n          <li><a href=\"#modules\">Axis · Clinicians<\u002Fa><\u002Fli>\n          <li><a href=\"#modules\">Detect · Diagnostics<\u002Fa><\u002Fli>\n          <li><a href=\"#modules\">All 12 →<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Company<\u002Fh5>\n        <ul>\n          <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n          <li><a href=\"#roadmap\">Roadmap<\u002Fa><\u002Fli>\n          <li><a href=\"#india\">India<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Careers<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"footer-col\">\n        <h5>Contact<\u002Fh5>\n        <ul>\n          <li><a href=\"mailto:press@curova.com\">Press<\u002Fa><\u002Fli>\n          <li><a href=\"mailto:investors@curova.com\">Investors<\u002Fa><\u002Fli>\n          <li><a href=\"mailto:partners@curova.com\">Partnerships<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-bottom\">\n      <div class=\"disc\"><strong style=\"color:#fff; font-weight:600;\">Clinical disclaimer.<\u002Fstrong> Curova is health intelligence infrastructure. Clinical decisions are made by licensed clinicians. Curova does not provide autonomous diagnosis.<\u002Fdiv>\n      <div class=\"copy\">© 2026 Curova Health, Inc.<br>All rights reserved.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ---------- TWEAKS ---------- -->\n<button class=\"tweaks-btn\" id=\"tweaks-btn\" title=\"Tweaks\" aria-label=\"Open tweaks\">\n  <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath><\u002Fsvg>\n<\u002Fbutton>\n\n<div class=\"tweaks-panel\" id=\"tweaks-panel\">\n  <h3>Tweaks <button class=\"close\" id=\"tweaks-close\" aria-label=\"Close\">×<\u002Fbutton><\u002Fh3>\n  <div class=\"sub\">Customize the visual system.<\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Primary color<\u002Fdiv>\n    <div class=\"swatches\" id=\"primary-swatches\">\n      <button class=\"swatch on\" data-color=\"#0A2540\" style=\"background:#0A2540\" aria-label=\"Medical blue\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#0F1F3D\" style=\"background:#0F1F3D\" aria-label=\"Navy\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#1B2A4E\" style=\"background:#1B2A4E\" aria-label=\"Slate\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#0E1116\" style=\"background:#0E1116\" aria-label=\"Ink\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#003049\" style=\"background:#003049\" aria-label=\"Deep\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#1E3A8A\" style=\"background:#1E3A8A\" aria-label=\"Indigo\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Accent color<\u002Fdiv>\n    <div class=\"swatches\" id=\"accent-swatches\">\n      <button class=\"swatch on\" data-color=\"#00B4A6\" style=\"background:#00B4A6\" aria-label=\"Electric teal\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#06B6D4\" style=\"background:#06B6D4\" aria-label=\"Cyan\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#3B82F6\" style=\"background:#3B82F6\" aria-label=\"Blue\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#10B981\" style=\"background:#10B981\" aria-label=\"Emerald\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#8B5CF6\" style=\"background:#8B5CF6\" aria-label=\"Violet\"><\u002Fbutton>\n      <button class=\"swatch\" data-color=\"#F59E0B\" style=\"background:#F59E0B\" aria-label=\"Amber\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Background tone<\u002Fdiv>\n    <div class=\"seg\" id=\"bg-seg\">\n      <button class=\"on\" data-bg=\"white\">White<\u002Fbutton>\n      <button data-bg=\"cool\">Cool<\u002Fbutton>\n      <button data-bg=\"warm\">Warm<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Display font<\u002Fdiv>\n    <select id=\"display-font\">\n      <option value=\"Sora\">Sora<\u002Foption>\n      <option value=\"Space Grotesk\">Space Grotesk<\u002Foption>\n      <option value=\"Manrope\">Manrope<\u002Foption>\n      <option value=\"Plus Jakarta Sans\">Plus Jakarta Sans<\u002Foption>\n      <option value=\"Inter\">Inter<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Body font<\u002Fdiv>\n    <select id=\"body-font\">\n      <option value=\"Inter\">Inter<\u002Foption>\n      <option value=\"DM Sans\">DM Sans<\u002Foption>\n      <option value=\"Manrope\">Manrope<\u002Foption>\n      <option value=\"Plus Jakarta Sans\">Plus Jakarta Sans<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Corner radius<\u002Fdiv>\n    <div class=\"seg\" id=\"radius-seg\">\n      <button data-r=\"6\">Sharp<\u002Fbutton>\n      <button class=\"on\" data-r=\"20\">Soft<\u002Fbutton>\n      <button data-r=\"28\">Round<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Button shape<\u002Fdiv>\n    <div class=\"seg\" id=\"btn-seg\">\n      <button data-btn=\"8\">Square<\u002Fbutton>\n      <button data-btn=\"14\">Rounded<\u002Fbutton>\n      <button class=\"on\" data-btn=\"100\">Pill<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"group\">\n    <div class=\"label\">Hero gradient<\u002Fdiv>\n    <div class=\"seg\" id=\"mesh-seg\">\n      <button class=\"on\" data-mesh=\"on\">On<\u002Fbutton>\n      <button data-mesh=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   Module data\n============================================================ */\nconst MODULES = [\n  { name:\"Node\",      serves:\"Patients\",                     line:\"The patient's coordinated care companion.\", bullets:[\"AI-guided triage\",\"Appointments, reports, prescriptions, reminders\",\"Voice-first multilingual UX\",\"Consent and history in one place\"], feeds:\"Triage signal, adherence, longitudinal symptom trajectory\" },\n  { name:\"Axis\",      serves:\"Clinicians\",                   line:\"The clinician's AI-assisted workspace.\",    bullets:[\"AI-assisted notes and summaries\",\"In-context clinical references\",\"E-prescription and order entry\",\"Longitudinal patient view\"],                                  feeds:\"Clinical reasoning trail, prescription patterns, outcome signal\" },\n  { name:\"Detect\",    serves:\"Labs · hospitals · clinicians\",line:\"The operating layer for diagnostics.\",     bullets:[\"Test routing across networks\",\"Sample-to-report tracking\",\"FHIR-aligned structured results\",\"TAT visibility\"],                                                          feeds:\"Structured diagnostic events, panel patterns, abnormal-flag streams\" },\n  { name:\"Dose\",      serves:\"Pharmacies · patients\",        line:\"Prescription fulfillment, end to end.\",     bullets:[\"Prescription ingestion and validation\",\"Inventory intelligence\",\"Substitution policy\",\"Refill orchestration\"],                                                       feeds:\"Fill rate, substitution patterns, adherence cohorts\" },\n  { name:\"Nexus\",     serves:\"Networks · insurers\",          line:\"The command center for health organizations.\", bullets:[\"Operational dashboards\",\"Clinical and financial KPIs\",\"Compliance posture\",\"Cohort analytics\"],                                                                  feeds:\"Network-level patterns, capacity signal\" },\n  { name:\"IQ Engine\", serves:\"Every module\",                 line:\"The governed intelligence under everything.\", bullets:[\"Decision Trail Graph\",\"Governed Care Ledger\",\"Multilingual reasoning\",\"Eval and red-team rails\"],                                                                  feeds:\"This is the IQ\" },\n  { name:\"Pay\",       serves:\"Patients · providers · employers\", line:\"Care payments, structured at the source.\", bullets:[\"Visit and order checkout\",\"Split payments\",\"Provider payouts\",\"Reconciliation\"],                                                                                feeds:\"Spend patterns, price discovery, reimbursement signal\" },\n  { name:\"Insure\",    serves:\"Insurers · hospitals · patients\",   line:\"Claims intelligence on a clean substrate.\", bullets:[\"Coverage check and pre-auth\",\"Claims validation against the care record\",\"Fraud and anomaly detection\",\"Appeal trail\"],                                       feeds:\"Claim outcomes, fraud signal, coverage gaps\" },\n  { name:\"Wellness\",  serves:\"Patients · employers · insurers\",    line:\"Preventive care, longitudinally.\",        bullets:[\"Risk profiles\",\"Preventive panels\",\"Lifestyle programs\",\"Outcome tracking\"],                                                                                 feeds:\"Risk trajectory, intervention efficacy\" },\n  { name:\"Curova OS\", serves:\"All modules · all integrations\",     line:\"The substrate that connects everything.\", bullets:[\"FHIR-aligned data model\",\"ABHA-ready identity\",\"Consent receipts\",\"Audit event stream\"],                                                                      feeds:\"Every structured event\" },\n];\n\ndocument.getElementById(\"modules-grid\").innerHTML = MODULES.map(m => `\n  <div class=\"module-card fade-up\">\n    <div class=\"mh\">\n      <div class=\"mn\">${m.name}<\u002Fdiv>\n      <div class=\"ms\">Serves<br>${m.serves}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ml\">${m.line}<\u002Fdiv>\n    <ul>${m.bullets.map(b => `<li>${b}<\u002Fli>`).join(\"\")}<\u002Ful>\n    <div class=\"mf\">Feeds IQ — ${m.feeds}<\u002Fdiv>\n  <\u002Fdiv>\n`).join(\"\");\n\n/* Pillars */\nconst PILLARS = [\n  [\"01\",\"Decision Trail Graph\",\"Every interaction — symptom, note, lab, prescription, claim — captured as a node with provenance, reasoning, and clinical sign-off.\"],\n  [\"02\",\"Governed Care Ledger\",\"An append-only ledger of care events, cryptographically chained, queryable by patient, clinician, and regulator.\"],\n  [\"03\",\"Human-in-the-loop\",\"Structured sign-off, confidence-banded outputs, and clinician override surfaces wired into every AI call site.\"],\n  [\"04\",\"Multilingual reasoning\",\"Health-tuned models that reason in 22+ Indian languages — evaluated per language, per task.\"],\n  [\"05\",\"Eval & red-team\",\"Continuous evaluation against clinical benchmarks and adversarial probes; failures route into the dev loop.\"],\n  [\"06\",\"Event streams\",\"Care does not move in one system. Curova IQ subscribes to events from every module, structured at the source.\"],\n];\ndocument.getElementById(\"pillars\").innerHTML = PILLARS.map(([n,t,b]) => `\n  <div class=\"pillar fade-up\">\n    <div class=\"pi\">${n}<\u002Fdiv>\n    <h4>${t}<\u002Fh4>\n    <p>${b}<\u002Fp>\n  <\u002Fdiv>\n`).join(\"\");\n\n/* Trust */\nconst TRUST = [\n  [\"01\",\"Consent receipts\",\"Every access carries a receipt — patients can see, scope, and revoke who used their data, for what, and when.\"],\n  [\"02\",\"Purpose-based access\",\"Data flows only for the purpose it was consented to. Bound to a stated purpose at the call site, not the role.\"],\n  [\"03\",\"Audit event stream\",\"Immutable log of who did what, when, and why. Cryptographically chained, queryable per patient, clinician, and regulator.\"],\n  [\"04\",\"Clinician sign-off\",\"AI assists. Clinicians decide. No clinical recommendation reaches a patient without a named clinician's signature.\"],\n  [\"05\",\"FHIR-aligned data model\",\"Interoperable by default. Curova writes and reads FHIR R4 across the substrate — every event, every resource.\"],\n  [\"06\",\"ABHA-ready identity\",\"Patient-controlled identity, on India's national rails. ABDM-compliant consent flows, designed for portability.\"],\n  [\"07\",\"Policy engine\",\"Rules of access encoded, not implied. Org, role, geography, purpose, and consent state evaluated at every read and write.\"],\n  [\"08\",\"Safety escalation\",\"Edge cases route to humans, fast. Defined triggers, named on-call clinicians, measured response.\"],\n  [\"09\",\"Explainable outputs\",\"Every recommendation carries reasoning. Sources, model, confidence, dissenting signals attached to the output.\"],\n];\ndocument.getElementById(\"trust-grid\").innerHTML = TRUST.map(([n,t,b]) => `\n  <div class=\"trust-cell fade-up\">\n    <div class=\"tn\">${n}<\u002Fdiv>\n    <h4>${t}<\u002Fh4>\n    <p>${b}<\u002Fp>\n  <\u002Fdiv>\n`).join(\"\");\n\n/* Seven rails */\nconst SEVEN = [\n  [\"01\",\"Fragmented provider networks\",\"Hundreds of thousands of independent providers, no shared substrate.\"],\n  [\"02\",\"High mobile adoption\",\"The phone is the chart, the wallet, and the front door.\"],\n  [\"03\",\"ABDM and ABHA rails\",\"National identity and consent infrastructure, ready to build on.\"],\n  [\"04\",\"Multilingual population\",\"22+ official languages — voice-first by necessity.\"],\n  [\"05\",\"Diagnostics & pharmacy density\",\"Most-ordered touchpoints are also the most fragmented.\"],\n  [\"06\",\"Insurance modernization\",\"Coverage is expanding faster than the infrastructure beneath it.\"],\n  [\"07\",\"Tier 2 & 3 expansion\",\"Where demand is highest and digital substrate is thinnest.\"],\n];\ndocument.getElementById(\"seven-grid\").innerHTML = SEVEN.map(([n,t,b]) => `\n  <div class=\"cell fade-up\">\n    <div class=\"n\">${n}<\u002Fdiv>\n    <div class=\"t\">${t}<\u002Fdiv>\n    <div class=\"b\">${b}<\u002Fdiv>\n  <\u002Fdiv>\n`).join(\"\");\n\n/* Roadmap */\nconst PHASES = [\n  [\"Phase 1\",\"2026\",\"Diagnostics OS and pilot\",\"Detect and Detect Collect across pilot lab and hospital networks; structured-event substrate online.\",\"Live\"],\n  [\"Phase 2\",\"2027\",\"Patient and clinician workflows\",\"Node and Axis at clinical scale; clinician sign-off and longitudinal record live.\",\"Pilot\"],\n  [\"Phase 3\",\"2028\",\"Pharmacy, payments, claims\",\"Dose, Pay, and Insure tied to the care record; first end-to-end patient journey on Curova rails.\",\"Build\"],\n  [\"Phase 4\",\"2029\",\"Enterprise command center\",\"Nexus for hospital, lab, and pharmacy networks; operational and compliance posture.\",\"Plan\"],\n  [\"Phase 5\",\"2030\",\"Intelligence expansion\",\"IQ Engine multilingual HealthLLMs and clinical-eval rails; explainable-by-default outputs.\",\"Plan\"],\n  [\"Phase 6\",\"2031–32\",\"Geographic expansion\",\"SEA, Africa, and LATAM with localized substrate and identity rails.\",\"Horizon\"],\n];\ndocument.getElementById(\"roadmap-list\").innerHTML = PHASES.map(([p,y,t,d,s]) => `\n  <div class=\"roadmap-row fade-up\">\n    <div>\n      <div class=\"ph\">${p}<\u002Fdiv>\n      <div class=\"y\">${y}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ti\">${t}<\u002Fdiv>\n    <div class=\"d\">${d}<\u002Fdiv>\n    <div style=\"display:flex; justify-content:flex-end;\">\n      <span class=\"chip ${s===\"Live\"?\"chip-accent\":\"\"}\">${s===\"Live\"?'<span class=\"dot live\"><\u002Fspan> ':\"\"}${s}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n`).join(\"\");\n\n/* ============================================================\n   Fade-up on scroll\n============================================================ */\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting) { e.target.classList.add(\"in\"); io.unobserve(e.target); }\n  });\n}, { threshold: 0.08, rootMargin: \"0px 0px -40px 0px\" });\ndocument.querySelectorAll(\".fade-up\").forEach(el => io.observe(el));\n\n/* ============================================================\n   Tweaks\n============================================================ */\nconst btn = document.getElementById(\"tweaks-btn\");\nconst panel = document.getElementById(\"tweaks-panel\");\nconst closeBtn = document.getElementById(\"tweaks-close\");\nbtn.addEventListener(\"click\", () => panel.classList.toggle(\"open\"));\ncloseBtn.addEventListener(\"click\", () => panel.classList.remove(\"open\"));\n\nconst root = document.documentElement;\nfunction setRGBA(hex, alpha) {\n  const h = hex.replace(\"#\",\"\");\n  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n  return `rgba(${r},${g},${b},${alpha})`;\n}\n\nfunction setPrimary(c) {\n  root.style.setProperty(\"--primary\", c);\n  root.style.setProperty(\"--ink\", c);\n  // derive supporting tones\n}\nfunction setAccent(c) {\n  root.style.setProperty(\"--accent\", c);\n  root.style.setProperty(\"--accent-soft\", setRGBA(c, 0.10));\n}\n\ndocument.querySelectorAll(\"#primary-swatches .swatch\").forEach(sw => {\n  sw.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#primary-swatches .swatch\").forEach(s => s.classList.remove(\"on\"));\n    sw.classList.add(\"on\");\n    setPrimary(sw.dataset.color);\n  });\n});\ndocument.querySelectorAll(\"#accent-swatches .swatch\").forEach(sw => {\n  sw.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#accent-swatches .swatch\").forEach(s => s.classList.remove(\"on\"));\n    sw.classList.add(\"on\");\n    setAccent(sw.dataset.color);\n  });\n});\n\ndocument.querySelectorAll(\"#bg-seg button\").forEach(b => {\n  b.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#bg-seg button\").forEach(x => x.classList.remove(\"on\"));\n    b.classList.add(\"on\");\n    const v = b.dataset.bg;\n    if (v === \"white\") {\n      root.style.setProperty(\"--bg\", \"#FFFFFF\");\n      root.style.setProperty(\"--bg-2\", \"#F7F8FA\");\n      root.style.setProperty(\"--bg-3\", \"#EEF1F6\");\n    } else if (v === \"cool\") {\n      root.style.setProperty(\"--bg\", \"#FAFBFD\");\n      root.style.setProperty(\"--bg-2\", \"#F0F4F9\");\n      root.style.setProperty(\"--bg-3\", \"#E6ECF4\");\n    } else {\n      root.style.setProperty(\"--bg\", \"#FBFAF7\");\n      root.style.setProperty(\"--bg-2\", \"#F3F1EB\");\n      root.style.setProperty(\"--bg-3\", \"#EAE5DB\");\n    }\n  });\n});\n\ndocument.getElementById(\"display-font\").addEventListener(\"change\", (e) => {\n  root.style.setProperty(\"--font-display\", `\"${e.target.value}\", \"Inter\", sans-serif`);\n});\ndocument.getElementById(\"body-font\").addEventListener(\"change\", (e) => {\n  root.style.setProperty(\"--font-sans\", `\"${e.target.value}\", system-ui, sans-serif`);\n});\n\ndocument.querySelectorAll(\"#radius-seg button\").forEach(b => {\n  b.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#radius-seg button\").forEach(x => x.classList.remove(\"on\"));\n    b.classList.add(\"on\");\n    root.style.setProperty(\"--radius\", b.dataset.r + \"px\");\n    root.style.setProperty(\"--radius-sm\", Math.max(4, parseInt(b.dataset.r) - 8) + \"px\");\n  });\n});\n\ndocument.querySelectorAll(\"#btn-seg button\").forEach(b => {\n  b.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#btn-seg button\").forEach(x => x.classList.remove(\"on\"));\n    b.classList.add(\"on\");\n    root.style.setProperty(\"--radius-pill\", b.dataset.btn + \"px\");\n  });\n});\n\ndocument.querySelectorAll(\"#mesh-seg button\").forEach(b => {\n  b.addEventListener(\"click\", () => {\n    document.querySelectorAll(\"#mesh-seg button\").forEach(x => x.classList.remove(\"on\"));\n    b.classList.add(\"on\");\n    const m = document.querySelector(\".mesh\");\n    if (m) m.style.display = b.dataset.mesh === \"off\" ? \"none\" : \"block\";\n  });\n});\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
